name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Verify OAuth secrets
      env:
        NOTION_OAUTH_CLIENT_ID: ${{ secrets.NOTION_OAUTH_CLIENT_ID }}
        NOTION_OAUTH_SECRET: ${{ secrets.NOTION_OAUTH_SECRET }}
      run: |
        test -n "$NOTION_OAUTH_CLIENT_ID" || { echo "::error::NOTION_OAUTH_CLIENT_ID secret is missing"; exit 1; }
        test -n "$NOTION_OAUTH_SECRET"    || { echo "::error::NOTION_OAUTH_SECRET secret is missing";    exit 1; }

    - name: Run tests
      run: go test ./... -race -count=1

    - name: Build all platforms
      env:
        NOTION_OAUTH_CLIENT_ID: ${{ secrets.NOTION_OAUTH_CLIENT_ID }}
        NOTION_OAUTH_SECRET: ${{ secrets.NOTION_OAUTH_SECRET }}
      run: make release

    # Generate SHA-256 checksums for every release artifact. install.js fetches
    # this file before downloading any binary and refuses to install a binary
    # whose hash does not match. The file is also uploaded as a release asset
    # so end users can verify manually.
    - name: Generate SHA256SUMS
      run: |
        cd build
        sha256sum \
          notion-cli-darwin-arm64 \
          notion-cli-darwin-amd64 \
          notion-cli-linux-amd64 \
          notion-cli-linux-arm64 \
          notion-cli-windows-amd64.exe \
          > SHA256SUMS
        cat SHA256SUMS

    - name: Upload binaries to release
      if: github.event_name == 'release'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
          build/notion-cli-darwin-arm64 \
          build/notion-cli-darwin-amd64 \
          build/notion-cli-linux-amd64 \
          build/notion-cli-linux-arm64 \
          build/notion-cli-windows-amd64.exe \
          build/SHA256SUMS

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]

    # Gate npm publishing behind a GitHub Environment so the NPM_TOKEN is
    # only injected when a workflow run targets the protected environment.
    # MAINTAINER: create this in repo Settings → Environments → "npm-publish",
    # add NPM_TOKEN as an environment secret, and enable "Required reviewers"
    # set to the maintainer. The workflow will pause for manual approval on
    # every release until the reviewer clicks approve.
    environment: npm-publish

    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '22.x'
        registry-url: 'https://registry.npmjs.org'

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Verify OAuth secrets
      env:
        NOTION_OAUTH_CLIENT_ID: ${{ secrets.NOTION_OAUTH_CLIENT_ID }}
        NOTION_OAUTH_SECRET: ${{ secrets.NOTION_OAUTH_SECRET }}
      run: |
        test -n "$NOTION_OAUTH_CLIENT_ID" || { echo "::error::NOTION_OAUTH_CLIENT_ID secret is missing"; exit 1; }
        test -n "$NOTION_OAUTH_SECRET"    || { echo "::error::NOTION_OAUTH_SECRET secret is missing";    exit 1; }

    - name: Build platform binaries
      env:
        NOTION_OAUTH_CLIENT_ID: ${{ secrets.NOTION_OAUTH_CLIENT_ID }}
        NOTION_OAUTH_SECRET: ${{ secrets.NOTION_OAUTH_SECRET }}
      run: make release

    - name: Copy binaries to platform packages
      run: |
        mkdir -p npm/notion-cli-darwin-arm64/bin
        mkdir -p npm/notion-cli-darwin-x64/bin
        mkdir -p npm/notion-cli-linux-x64/bin
        mkdir -p npm/notion-cli-linux-arm64/bin
        mkdir -p npm/notion-cli-win32-x64/bin
        cp build/notion-cli-darwin-arm64 npm/notion-cli-darwin-arm64/bin/notion-cli
        cp build/notion-cli-darwin-amd64 npm/notion-cli-darwin-x64/bin/notion-cli
        cp build/notion-cli-linux-amd64 npm/notion-cli-linux-x64/bin/notion-cli
        cp build/notion-cli-linux-arm64 npm/notion-cli-linux-arm64/bin/notion-cli
        cp build/notion-cli-windows-amd64.exe npm/notion-cli-win32-x64/bin/notion-cli.exe

    - name: Check if version exists on npm
      id: check-version
      run: |
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

        if npm view @coastal-programs/notion-cli@$PACKAGE_VERSION version 2>/dev/null; then
          echo "version_exists=true" >> $GITHUB_OUTPUT
          echo "Version $PACKAGE_VERSION already published to npm"
        else
          echo "version_exists=false" >> $GITHUB_OUTPUT
          echo "Version $PACKAGE_VERSION is new - ready to publish"
        fi

    - name: Publish platform packages
      if: steps.check-version.outputs.version_exists == 'false'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        FAILED=0
        for pkg in npm/notion-cli-*/; do
          echo "Publishing $pkg..."
          cd "$pkg"
          if ! npm publish --access public --provenance; then
            echo "::warning::Failed to publish $pkg"
            FAILED=1
          fi
          cd ../..
        done
        if [ "$FAILED" -eq 1 ]; then
          echo "::error::One or more platform packages failed to publish. Check that the NPM_TOKEN has write access to the @coastal-programs scope and that the token owner is an org member with publish permissions."
          exit 1
        fi

    - name: Publish main wrapper package
      if: steps.check-version.outputs.version_exists == 'false'
      run: npm publish --access public --provenance
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish Success
      if: steps.check-version.outputs.version_exists == 'false'
      run: |
        VERSION=${{ steps.check-version.outputs.package_version }}
        echo "Successfully published @coastal-programs/notion-cli@$VERSION to npm"
        echo "Package URL: https://www.npmjs.com/package/@coastal-programs/notion-cli"
