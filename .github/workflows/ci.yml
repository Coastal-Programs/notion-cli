name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod

    - name: Build
      run: make build

    - name: Lint
      run: make lint

    - name: Test
      run: go test ./... -v -race -count=1

  cross-compile:
    name: Cross-Compile
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod

    # Verify the code compiles for every target platform. This deliberately
    # does NOT run `make release`: that target requires the OAuth secrets and
    # embeds them into the binary. GitHub does not expose repository secrets to
    # pull requests from forks or Dependabot, so requiring them here produces a
    # false-negative failure on every such PR. The real credential-embedding
    # release build runs on tag/release in publish.yml. `make cross-compile`
    # builds all platforms with no secrets, so these artifacts are secret-free.
    - name: Cross-compile all platforms
      run: make cross-compile

    - name: Upload binaries
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: binaries
        path: build/notion-cli-*
        retention-days: 7

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build, cross-compile]
    if: always()

    steps:
    - name: Check all jobs succeeded
      run: |
        if [ "${{ needs.build.result }}" != "success" ] || \
           [ "${{ needs.cross-compile.result }}" != "success" ]; then
          echo "CI pipeline failed"
          exit 1
        fi
        echo "All CI checks passed"
