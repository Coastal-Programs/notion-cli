name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build
      run: make build

    - name: Lint
      run: make lint

    - name: Test
      run: go test ./... -v -race -count=1

  cross-compile:
    name: Cross-Compile
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build all platforms
      run: make release

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: build/notion-cli-*
        retention-days: 7

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build, cross-compile]
    if: always()

    steps:
    - name: Check all jobs succeeded
      run: |
        if [ "${{ needs.build.result }}" != "success" ] || \
           [ "${{ needs.cross-compile.result }}" != "success" ]; then
          echo "CI pipeline failed"
          exit 1
        fi
        echo "All CI checks passed"
